name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit hooks (ruff + ty + bandit + ...)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: '**/pyproject.toml'

    - name: Set up Python 3.14
      run: uv python install 3.14

    - name: Install all dependency groups
      run: uv sync --all-groups

    - name: Cache pre-commit environments
      uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # SKIP=no-commit-to-branch: that hook is meant for local commits;
      # CI runs on the merge ref and would always trip it.
    - name: Run pre-commit hooks
      env:
        SKIP: no-commit-to-branch
      run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    name: Test (py3.14 on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: '**/pyproject.toml'

    - name: Set up Python 3.14
      run: uv python install 3.14

    - name: Install package + dev/test deps
      run: |
        uv sync --all-groups
        uv pip install -e .

    - name: pytest
      run: uv run pytest --cov=sidekick_usages --cov-report=xml

    - name: Upload coverage (Ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: coverage.xml
        retention-days: 7

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [pre-commit, test]
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python 3.14
      run: uv python install 3.14

    - name: Build distributions
      run: uv build

    - name: Verify wheel installs and runs
      run: |
        uv venv smoke-test
        uv pip install --python smoke-test/bin/python dist/*.whl
        smoke-test/bin/sidekick-usages --version

    - name: Upload distributions
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 14
