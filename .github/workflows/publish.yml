name: Publish to PyPI

on:
  push:
    tags:
    - v*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---- Re-run quality gates against the tagged commit -----------------
  # Tags can be cut from a feature branch that didn't run CI yet,
  # so we re-verify everything before building artifacts.
  verify:
    name: Verify tag passes CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true

    - name: Set up Python 3.14
      run: uv python install 3.14

    - name: Install all dependency groups
      run: uv sync --all-groups

    - name: Run pre-commit hooks
      env:
        SKIP: no-commit-to-branch
      run: uv run pre-commit run --all-files --show-diff-on-failure

    - name: pytest
      run: |
        uv pip install -e .
        uv run pytest

  # ---- Build wheel + sdist --------------------------------------------
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: verify
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0

    - name: Set up Python 3.14
      run: uv python install 3.14

    - name: Verify tag matches pyproject version
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        PROJECT_VERSION=$(uv run python -c \
          "import tomllib, pathlib; \
           print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
        if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
          echo "::error::Tag $GITHUB_REF_NAME does not match project version $PROJECT_VERSION"
          exit 1
        fi
        echo "Tag $GITHUB_REF_NAME matches project version $PROJECT_VERSION"

    - name: Build
      run: uv build

    - name: Smoke-test the wheel
      run: |
        uv venv verify-env
        uv pip install --python verify-env/bin/python dist/*.whl
        verify-env/bin/sidekick-usages --version

    - name: Upload distributions
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/
        retention-days: 7

  # ---- Publish to PyPI (Trusted Publishing via OIDC) ------------------
  # Gated behind the repo variable PYPI_PUBLISHING_ENABLED so tagging
  # before the pypi.org trusted publisher is configured won't fail CI.
  # To enable: set vars.PYPI_PUBLISHING_ENABLED=true in repo settings
  # AND configure a pending publisher at
  #   https://pypi.org/manage/account/publishing/
  # with:
  #   PyPI Project Name: sidekick-usages
  #   Owner: Sawmonabo
  #   Repository name: sidekick-usages
  #   Workflow name: publish.yml
  #   Environment name: pypi
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: vars.PYPI_PUBLISHING_ENABLED == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/sidekick-usages
    permissions:
      id-token: write  # required for OIDC
    steps:
    - name: Download distributions
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
          # No 'password:' — Trusted Publishing handles auth via OIDC.
        print-hash: true

  # ---- Create GitHub Release with built artifacts ---------------------
  # Skipped alongside publish-pypi when PYPI_PUBLISHING_ENABLED is unset;
  # use `gh release create` manually in that case.
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    if: vars.PYPI_PUBLISHING_ENABLED == 'true'
    permissions:
      contents: write  # required to create releases
    steps:
    - uses: actions/checkout@v6

    - name: Download distributions
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    # release-please created the GitHub Release (with notes from CHANGELOG.md)
    # when it merged the release PR. softprops updates that existing release
    # in place to attach the built dist files; we deliberately omit `body`
    # so the release-please-generated notes are preserved.
    - name: Attach distributions to release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}
        files: |
          dist/*.whl
          dist/*.tar.gz
        fail_on_unmatched_files: true
