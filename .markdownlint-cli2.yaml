# markdownlint-cli2 configuration
# https://github.com/DavidAnson/markdownlint-cli2
ignores:
- '**/CLAUDE.md'
- .claude/**
config:
  table-column-style: false # MD060 — disable pipe-spacing enforcement for "compact" style
  blanks-around-lists: false # MD032 — disable blank lines around lists enforcement
  fenced-code-language: false # MD040 — disable fenced code block language specification enforcement
